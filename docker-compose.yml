services:
  # 1. Database Service (MySQL 8)
  db:
    image: mysql:8.0
    container_name: sentinelops_db
    restart: always
    environment:
      MYSQL_DATABASE: sentinelops_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      # Inject the schema and seeds automatically on initialization
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Database Persistence
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 10s
      retries: 5
      start_period: 15s

  # 2. Python Flask API Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: sentinelops_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - DB_HOST=db

  # 3. Static Nginx Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: sentinelops_frontend
    restart: always

  # 4. Reverse Proxy Nginx Gateway Router
  nginx:
    image: nginx:alpine
    container_name: sentinelops_nginx_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  # 5. Database Web GUI (Adminer Console)
  adminer:
    image: adminer:latest
    container_name: sentinelops_db_gui
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
